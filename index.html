<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thematic Rotation Dashboard</title>
<style>

  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#e8e6de;--text2:#9c9a92;--text3:#6b6b67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--info-bg:#0c447c;--info-text:#b5d4f4;--warn-bg:#633806;--warn-text:#fac775;--success-bg:#27500a;--success-text:#c0dd97;--danger-bg:#791f1f;--danger-text:#f7c1c1}}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px}
  .page{max-width:1300px;margin:0 auto;padding:1rem}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px}
  .brand-title{font-size:15px;font-weight:600}
  .brand-sub{font-size:11px;color:var(--text2);margin-top:1px}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tf-tabs{display:flex;gap:3px}
  .tf-btn{padding:4px 12px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
  .tf-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
  .badge-warn{background:var(--warn-bg);color:var(--warn-text)}
  .badge-live{background:var(--success-bg);color:var(--success-text)}
  .icon-btn{padding:4px 12px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
  .icon-btn:hover{background:var(--bg2)}
  .icon-btn:disabled{opacity:.5;cursor:not-allowed}
  .layout{display:grid;grid-template-columns:220px 1fr;gap:12px;align-items:start}
  @media(max-width:680px){.layout{grid-template-columns:1fr}}
  .sidebar{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;position:sticky;top:1rem}
  .sidebar-sec{padding:10px 12px;border-bottom:0.5px solid var(--border)}
  .sidebar-sec:last-child{border-bottom:none}
  .sec-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  .sector-item{display:flex;align-items:center;justify-content:space-between;gap:4px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;transition:background .1s}
  .sector-item:hover{background:var(--bg2)}
  .sector-item.active{background:var(--info-bg);color:var(--info-text)}
  .s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .s-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .s-chg{font-size:10px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0}
  .pos{color:#16a34a}.neg{color:#dc2626}
  .ai-row{display:flex;gap:6px}
  .ai-row input{flex:1;padding:6px 10px;font-size:12px;border:0.5px solid var(--border2);border-radius:7px;background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
  .ai-row input:focus{border-color:#378ADD}
  .ai-row button{padding:6px 10px;font-size:12px;border:0.5px solid var(--border2);border-radius:7px;background:transparent;color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
  .ai-row button:hover{background:var(--bg2)}
  .ai-sug{margin-top:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:10px;font-size:12px}
  .sug-row{display:flex;justify-content:space-between;gap:6px;margin-bottom:3px}
  .sug-lbl{font-size:10px;color:var(--text2)}
  .sug-val{font-size:11px;font-weight:600;text-align:right}
  .sug-rat{font-size:10px;color:var(--text2);margin:5px 0 8px;line-height:1.4}
  .sug-dom{margin-bottom:6px}
  .sug-dom-name{font-size:11px;font-weight:600;margin-bottom:3px}
  .tpills{display:flex;flex-wrap:wrap;gap:3px}
  .tp{font-size:10px;font-family:monospace;background:var(--bg);border:0.5px solid var(--border2);border-radius:4px;padding:2px 5px}
  .add-btn{display:block;width:100%;margin-top:8px;padding:5px;font-size:11px;border:0.5px solid var(--border2);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
  .add-btn:hover{background:var(--bg3)}
  .msg{font-size:11px;padding:5px 8px;border-radius:6px;margin-top:6px}
  .msg.ok{color:var(--success-text);background:var(--success-bg)}
  .msg.err{color:var(--danger-text);background:var(--danger-bg)}
  .msg.info{color:var(--text2)}
  .content{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .card-hdr{padding:8px 14px;border-bottom:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
  .breadcrumb{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
  .bcl{color:#378ADD;cursor:pointer}
  .bcl:hover{text-decoration:underline}
  .bcs{opacity:.4}
  .back-btn{font-size:11px;color:#378ADD;cursor:pointer;border:none;background:none;font-family:inherit;padding:0}
  .back-btn:hover{text-decoration:underline}
  .hm-grid{display:grid;gap:5px;padding:10px}
  .hm-cell{padding:10px 12px;border-radius:8px;cursor:pointer;position:relative;min-height:74px;transition:transform .1s,filter .1s}
  .hm-cell:hover{transform:scale(1.015);filter:brightness(1.05)}
  .hc-name{font-size:11px;font-weight:600;margin-bottom:3px;line-height:1.3}
  .hc-chg{font-size:18px;font-weight:600;line-height:1}
  .hc-meta{font-size:10px;margin-top:3px;opacity:.7}
  .hc-hint{position:absolute;bottom:5px;right:8px;font-size:9px;opacity:.35}
  .tk-area{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .tk-grid{display:flex;flex-wrap:wrap;gap:5px;padding:12px}
  .tk-card{padding:7px 11px;border-radius:7px;border:0.5px solid var(--border);min-width:86px;background:var(--bg2)}
  .tk-sym{font-size:11px;font-weight:700;font-family:monospace}
  .tk-chg{font-size:14px;font-weight:600}
  .tk-name{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
  .status-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:7px 14px;border-top:0.5px solid var(--border)}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .pulse.live{background:#22c55e}
  .prog{height:3px;background:var(--info-bg)}
  .prog-fill{height:100%;background:#378ADD;transition:width .2s;border-radius:2px;width:0%}
</style>
</head>
<body>
<div class="page">

    <div>

    </div>
    <div class="topbar-right">

      <button class="icon-btn" id="fetchBtn" onclick="fetchAll()">↺ Fetch live prices</button>
      <div class="tf-tabs" id="tfTabs">
        <button class="tf-btn active" data-tf="1D">1D</button>
        <button class="tf-btn" data-tf="1W">1W</button>
        <button class="tf-btn" data-tf="1M">1M</button>
        <button class="tf-btn" data-tf="3M">3M</button>

    </div>
  </div>
  <div class="layout">

        <div id="sectorList"></div>
      </div>
      <div class="sidebar-sec">
        <div class="sec-lbl">AI Theme Builder</div>
        <div class="ai-row">

          <button id="aiBtn" onclick="runAI()">Ask ↗</button>
        </div>
        <div id="aiResult"></div>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-hdr">
          <div class="breadcrumb" id="breadcrumb">All sectors</div>
          <button class="back-btn" id="backBtn" style="display:none" onclick="drillUp()">← Back</button>
        </div>
        <div class="prog" id="prog" style="display:none"><div class="prog-fill" id="progFill"></div></div>
        <div id="hmArea"></div>
        <div class="status-row">
          <span class="pulse" id="dot"></span>
          <span id="statusTxt">Demo data · click "Fetch live prices" to load real market data · click any cell to drill down</span>
        </div>
      </div>
      <div id="tkArea" style="display:none" class="tk-area">
        <div class="card-hdr"><span style="font-size:12px;font-weight:600" id="tkTitle">Tickers</span></div>
        <div class="tk-grid" id="tkGrid"></div>
      </div>
    </div>
  </div>
</div>

const DEMO={};
function seedDemo(n){if(n.tickers)n.tickers.forEach(t=>{if(!DEMO[t.s])DEMO[t.s]={'1D':+(Math.random()*8-3).toFixed(2),'1W':+(Math.random()*15-5).toFixed(2),'1M':+(Math.random()*30-10).toFixed(2),'3M':+(Math.random()*60-20).toFixed(2)};});['sectors','themes','subthemes','domains'].forEach(k=>{if(n[k])n[k].forEach(seedDemo);});}
TX.sectors.forEach(seedDemo);

let live={},tf='1D',path=[],isLive=false,pendingSug=null;

function getNode(){if(!path.length)return TX;let c=TX;for(let id of path){const l=c.sectors||c.themes||c.subthemes||c.domains;c=l.find(n=>n.id===id);if(!c)return TX;}return c;}
function getChildren(n){return n.sectors||n.themes||n.subthemes||n.domains||[];}
function allT(n){if(n.tickers)return n.tickers;const a=[];['sectors','themes','subthemes','domains'].forEach(k=>{if(n[k])n[k].forEach(c=>allT(c).forEach(t=>{if(!a.find(x=>x.s===t.s))a.push(t);}));});return a;}
function getPerf(tks,key){if(!tks||!tks.length)return null;const v=tks.map(t=>{const d=isLive?live[t.s]:DEMO[t.s];return d?d[key]:null;}).filter(v=>v!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function bgCol(v){if(v===null)return'var(--bg2)';if(v>=4)return'#15803d';if(v>=2)return'#16a34a';if(v>=.5)return'#4ade80';if(v>=0)return'#bbf7d0';if(v>=-.5)return'#fecaca';if(v>=-2)return'#f87171';if(v>=-4)return'#dc2626';return'#991b1b';}
function txCol(v){if(v===null)return'var(--text2)';return Math.abs(v)>=1.5?'#fff':v>=0?'#14532d':'#7f1d1d';}
function fmt(v){if(v===null||v===undefined)return'—';return(v>=0?'+':'')+v.toFixed(2)+'%';}

function renderSidebar(){document.getElementById('sectorList').innerHTML=TX.sectors.map(s=>{const v=getPerf(allT(s),tf);return`<div class="sector-item${path[0]===s.id?' active':''}" onclick="nav('${s.id}')"><span class="s-dot" style="background:${s.color}"></span><span class="s-name">${s.name}</span><span class="s-chg ${v!==null&&v>=0?'pos':'neg'}">${fmt(v)}</span></div>`;}).join('');}
function renderBC(){const back=document.getElementById('backBtn');back.style.display=path.length?'inline':'none';if(!path.length){document.getElementById('breadcrumb').innerHTML='All sectors';return;}let html=`<span class="bcl" onclick="nav()">All</span>`,c=TX;path.forEach((id,i)=>{const l=c.sectors||c.themes||c.subthemes||c.domains;c=l.find(n=>n.id===id);if(i<path.length-1)html+=`<span class="bcs">›</span><span class="bcl" onclick="navTo(${i+1})">${c.name}</span>`;else html+=`<span class="bcs">›</span><span>${c.name}</span>`;});document.getElementById('breadcrumb').innerHTML=html;}
function renderHM(){
  const area=document.getElementById('hmArea'),tkArea=document.getElementById('tkArea'),node=getNode(),children=getChildren(node);
  if(!children.length&&node.tickers){
    area.innerHTML='';tkArea.style.display='block';
    document.getElementById('tkTitle').textContent=node.name+' — tickers';
    document.getElementById('tkGrid').innerHTML=node.tickers.map(t=>{const d=isLive?live[t.s]:DEMO[t.s];const v=d?d[tf]:null;return`<div class="tk-card"><div class="tk-sym">$${t.s}</div><div class="tk-chg ${v!==null&&v>=0?'pos':'neg'}">${fmt(v)}</div><div class="tk-name">${t.n}</div></div>`;}).join('');return;
  }
  tkArea.style.display='none';
  const cols=children.length<=2?children.length:children.length<=4?2:children.length<=9?3:4;
  area.innerHTML=`<div class="hm-grid" style="grid-template-columns:repeat(${cols},1fr)">${children.map(child=>{const tks=allT(child);const v=getPerf(tks,tf);const nl=child.themes?'themes':child.subthemes?'sub-themes':child.domains?'domains':'tickers';return`<div class="hm-cell" style="background:${bgCol(v)};color:${txCol(v)}" onclick="nav('${child.id}')"><div class="hc-name">${child.name}</div><div class="hc-chg">${fmt(v)}</div><div class="hc-meta">${tks.length} tickers · avg ${tf}</div><div class="hc-hint">↳ ${nl}</div></div>`;}).join('')}</div>`;
}
function render(){renderSidebar();renderBC();renderHM();}

window.nav=function(id){if(!id){path=[];}else{path.push(id);}render();};
window.drillUp=function(){path.pop();render();};

async function fetchAll(){
  const btn=document.getElementById('fetchBtn'),prog=document.getElementById('prog'),fill=document.getElementById('progFill');
  btn.textContent='Fetching…';btn.disabled=true;prog.style.display='block';fill.style.width='5%';
  document.getElementById('statusTxt').textContent='Fetching live prices from Tiingo…';
  document.getElementById('dot').className='pulse';

  // Collect all unique tickers
  const seen=new Set(),allSyms=[];
  function collect(n){if(n.tickers)n.tickers.forEach(t=>{if(!seen.has(t.s)){seen.add(t.s);allSyms.push(t.s);}});['sectors','themes','subthemes','domains'].forEach(k=>{if(n[k])n[k].forEach(collect);});}
  TX.sectors.forEach(collect);

  // Step 1: Batch IEX quote (1D) — Tiingo allows comma-separated
  let ok=0,fail=0;
  const BATCH=100;
  const chunks=[];
  for(let i=0;i<allSyms.length;i+=BATCH)chunks.push(allSyms.slice(i,i+BATCH));

  for(let ci=0;ci<chunks.length;ci++){
    try{
      const url=`https://api.tiingo.com/iex/?tickers=${chunks[ci].join(',')}&token=${TIINGO_KEY}`;
      const r=await fetch(url,{headers:{Accept:'application/json'}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const data=await r.json();
      if(Array.isArray(data)){
        data.forEach(q=>{
          if(!q.ticker)return;
          const sym=q.ticker.toUpperCase();
          const last=q.tngoLast||q.last||q.mid;
          const prev=q.prevClose;
          const chg1D=(last&&prev&&prev!==0)?((last-prev)/prev)*100:0;
          live[sym]={'1D':chg1D,'1W':chg1D,'1M':chg1D,'3M':chg1D};
          ok++;
        });
      }
    }catch(e){fail+=chunks[ci].length;}
    fill.style.width=Math.round(10+((ci+1)/chunks.length)*40)+'%';
    await new Promise(r=>setTimeout(r,200));
  }

  // Step 2: Historical EOD for 1W/1M/3M — batch via Tiingo daily endpoint
  // Fetch all tickers that got a 1D quote, in batches using the bulk daily endpoint
  const today=new Date();
  const d3m=new Date(today);d3m.setDate(d3m.getDate()-95);
  const startDate=d3m.toISOString().split('T')[0];

  const histSyms=allSyms.filter(s=>live[s]);
  const histChunks=[];
  for(let i=0;i<histSyms.length;i+=20)histChunks.push(histSyms.slice(i,i+20));

  for(let hi=0;hi<histChunks.length;hi++){
    await Promise.all(histChunks[hi].map(async sym=>{
      try{
        const url=`https://api.tiingo.com/tiingo/daily/${sym}/prices?startDate=${startDate}&token=${TIINGO_KEY}`;
        const r=await fetch(url,{headers:{Accept:'application/json'}});
        if(!r.ok)return;
        const data=await r.json();
        if(!Array.isArray(data)||data.length<2)return;
        // data is sorted oldest→newest
        const n=data.length;
        const p0=data[n-1].adjClose||data[n-1].close;
        const p1w=data[Math.max(0,n-6)].adjClose||data[Math.max(0,n-6)].close;
        const p1m=data[Math.max(0,n-22)].adjClose||data[Math.max(0,n-22)].close;
        const p3m=data[0].adjClose||data[0].close;
        if(live[sym]){
          live[sym]['1W']=((p0-p1w)/p1w)*100;
          live[sym]['1M']=((p0-p1m)/p1m)*100;
          live[sym]['3M']=((p0-p3m)/p3m)*100;
        }
      }catch(e){}
    }));
    fill.style.width=Math.round(50+((hi+1)/histChunks.length)*48)+'%';
    await new Promise(r=>setTimeout(r,300));
  }

  fill.style.width='100%';
  await new Promise(r=>setTimeout(r,200));
  prog.style.display='none';

  if(ok>0){
    isLive=true;
    document.getElementById('demoBadge').style.display='none';
    document.getElementById('liveBadge').style.display='inline';
    document.getElementById('dot').className='pulse live';
    document.getElementById('statusTxt').textContent=`Live · ${ok} tickers · 1D/1W/1M/3M loaded · updated ${new Date().toLocaleTimeString()}`;
  }else{
    document.getElementById('statusTxt').textContent=`Could not load data — check network or API key`;
  }
  btn.textContent='↺ Fetch live prices';btn.disabled=false;
  render();
}

window.runAI=async function(){
  const input=document.getElementById('aiInput').value.trim();
  if(!input)return;
  const el=document.getElementById('aiResult'),btn=document.getElementById('aiBtn');
  el.innerHTML='<div class="msg info">Thinking…</div>';btn.disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are a financial taxonomy expert. Respond ONLY with a valid JSON object, no markdown, no backticks, no explanation. Fields: {"theme":"string","parentSector":"one of: Technology|Health Care|Energy|Financials|Consumer|Industrials|Real Estate|Materials|Utilities|Communication Services","parentTheme":"string","subtheme":"string","domains":[{"name":"string","tickers":["TICK1","TICK2","TICK3"]}],"rationale":"one sentence"} 2-4 domains, 3-5 real US-listed tickers each.`,messages:[{role:'user',content:`Theme: ${input}`}]})});
    const data=await res.json();
    const text=data.content.map(c=>c.text||'').join('');
    const parsed=JSON.parse(text.replace(/```[a-z]*|```/g,'').trim());
    pendingSug=parsed;
    let html=`<div class="ai-sug"><div class="sug-row"><span class="sug-lbl">Sector</span><span class="sug-val">${parsed.parentSector}</span></div><div class="sug-row"><span class="sug-lbl">Theme</span><span class="sug-val">${parsed.parentTheme}</span></div><div class="sug-row"><span class="sug-lbl">Sub-theme</span><span class="sug-val">${parsed.subtheme}</span></div><div class="sug-rat">${parsed.rationale}</div>`;
    parsed.domains.forEach(d=>{html+=`<div class="sug-dom"><div class="sug-dom-name">${d.name}</div><div class="tpills">${d.tickers.map(t=>`<span class="tp">$${t}</span>`).join('')}</div></div>`;});
    html+=`<button class="add-btn" id="addBtn">+ Add to taxonomy</button></div>`;
    el.innerHTML=html;
    document.getElementById('addBtn').onclick=addSug;
  }catch(e){el.innerHTML=`<div class="msg err">Error: ${e.message||'Could not parse response'}</div>`;}
  btn.disabled=false;
};

function addSug(){
  if(!pendingSug)return;
  const p=pendingSug;
  let sector=TX.sectors.find(s=>s.name===p.parentSector)||TX.sectors[0];
  let theme=sector.themes.find(t=>t.name===p.parentTheme);
  if(!theme){theme={id:'t'+Date.now(),name:p.parentTheme,color:'#7F77DD',subthemes:[]};sector.themes.push(theme);}
  const st={id:'st'+Date.now(),name:p.subtheme,color:'#1D9E75',domains:p.domains.map((d,i)=>({id:'d'+Date.now()+i,name:d.name,color:'#EF9F27',tickers:d.tickers.map(s=>({s,n:s}))}))};
  theme.subthemes.push(st);
  st.domains.forEach(dom=>dom.tickers.forEach(t=>{if(!DEMO[t.s])DEMO[t.s]={'1D':+(Math.random()*8-3).toFixed(2),'1W':+(Math.random()*15-5).toFixed(2),'1M':+(Math.random()*30-10).toFixed(2),'3M':+(Math.random()*60-20).toFixed(2)};}));
  pendingSug=null;
  document.getElementById('aiResult').innerHTML=`<div class="msg ok">Added "${p.subtheme}" → ${sector.name} › ${theme.name}</div>`;
  document.getElementById('aiInput').value='';
  render();
}

render();
</script>
</body>
</html>
