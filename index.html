<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thematic Rotation Dashboard</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #efede8;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9c9a92;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #0c447c;
    --warn-bg: #faeeda; --warn-text: #633806;
    --success-bg: #eaf3de; --success-text: #27500a;
    --danger-bg: #fcebeb; --danger-text: #791f1f;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e6de; --text2: #9c9a92; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info-bg: #0c447c; --info-text: #b5d4f4;
      --warn-bg: #633806; --warn-text: #fac775;
      --success-bg: #27500a; --success-text: #c0dd97;
      --danger-bg: #791f1f; --danger-text: #f7c1c1;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .page { max-width: 1280px; margin: 0 auto; padding: 1rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: #378ADD; }
  .brand-title { font-size: 15px; font-weight: 600; }
  .brand-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tf-tabs { display: flex; gap: 3px; }
  .tf-btn { padding: 4px 12px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 6px; background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; }
  .tf-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .badge-warn { background: var(--warn-bg); color: var(--warn-text); }
  .badge-live { background: var(--success-bg); color: var(--success-text); }
  .icon-btn { padding: 4px 12px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 6px; background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; transition: background .1s; }
  .icon-btn:hover { background: var(--bg2); }
  .icon-btn:disabled { opacity: .5; cursor: not-allowed; }
  .layout { display: grid; grid-template-columns: 220px 1fr; gap: 12px; align-items: start; }
  @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } }
  .sidebar { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; position: sticky; top: 1rem; }
  .sidebar-sec { padding: 10px 12px; border-bottom: 0.5px solid var(--border); }
  .sidebar-sec:last-child { border-bottom: none; }
  .sec-lbl { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
  .sector-item { display: flex; align-items: center; justify-content: space-between; gap: 4px; padding: 5px 8px; border-radius: 7px; cursor: pointer; font-size: 12px; transition: background .1s; }
  .sector-item:hover { background: var(--bg2); }
  .sector-item.active { background: var(--info-bg); color: var(--info-text); }
  .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .s-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-chg { font-size: 10px; font-weight: 600; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .pos { color: #16a34a; } .neg { color: #dc2626; }
  .ai-input-row { display: flex; gap: 6px; }
  .ai-input-row input { flex: 1; padding: 6px 10px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 7px; background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
  .ai-input-row input:focus { border-color: #378ADD; }
  .ai-input-row button { padding: 6px 10px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 7px; background: transparent; color: var(--text); cursor: pointer; font-family: inherit; white-space: nowrap; }
  .ai-input-row button:hover { background: var(--bg2); }
  .ai-suggestion { margin-top: 8px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px; font-size: 12px; }
  .sug-row { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
  .sug-lbl { font-size: 10px; color: var(--text2); }
  .sug-val { font-size: 11px; font-weight: 600; text-align: right; }
  .sug-rationale { font-size: 10px; color: var(--text2); margin: 5px 0 8px; line-height: 1.4; }
  .sug-domain { margin-bottom: 6px; }
  .sug-domain-name { font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .ticker-pills { display: flex; flex-wrap: wrap; gap: 3px; }
  .tp { font-size: 10px; font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 4px; padding: 2px 5px; }
  .add-btn { display: block; width: 100%; margin-top: 8px; padding: 5px; font-size: 11px; border: 0.5px solid var(--border2); border-radius: 6px; background: transparent; color: var(--text); cursor: pointer; font-family: inherit; transition: background .1s; }
  .add-btn:hover { background: var(--bg3); }
  .thinking { font-size: 11px; color: var(--text2); padding: 4px 0; }
  .success-msg { font-size: 11px; color: var(--success-text); background: var(--success-bg); border-radius: 6px; padding: 5px 8px; margin-top: 6px; }
  .err-msg { font-size: 11px; color: var(--danger-text); background: var(--danger-bg); border-radius: 6px; padding: 5px 8px; margin-top: 6px; }
  .content { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .card-header { padding: 8px 14px; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .breadcrumb { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; font-size: 12px; color: var(--text2); }
  .bc-link { color: #378ADD; cursor: pointer; text-decoration: none; }
  .bc-link:hover { text-decoration: underline; }
  .bc-sep { opacity: .4; }
  .back-btn { font-size: 11px; color: #378ADD; cursor: pointer; border: none; background: none; font-family: inherit; padding: 0; }
  .back-btn:hover { text-decoration: underline; }
  .heatmap-grid { display: grid; gap: 5px; padding: 10px; }
  .heat-cell { padding: 10px 12px; border-radius: 8px; cursor: pointer; position: relative; min-height: 72px; transition: transform .1s, filter .1s; }
  .heat-cell:hover { transform: scale(1.015); filter: brightness(1.05); }
  .hc-name { font-size: 11px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .hc-chg { font-size: 18px; font-weight: 600; line-height: 1; }
  .hc-meta { font-size: 10px; margin-top: 3px; opacity: .7; }
  .drill-hint { position: absolute; bottom: 5px; right: 8px; font-size: 9px; opacity: .35; }
  .ticker-area { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .ticker-grid { display: flex; flex-wrap: wrap; gap: 5px; padding: 12px; }
  .ticker-card { padding: 7px 11px; border-radius: 7px; border: 0.5px solid var(--border); min-width: 86px; background: var(--bg2); }
  .tc-sym { font-size: 11px; font-weight: 700; font-family: 'SF Mono', 'Fira Code', monospace; }
  .tc-chg { font-size: 14px; font-weight: 600; }
  .tc-name { font-size: 10px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
  .status-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); padding: 7px 14px; border-top: 0.5px solid var(--border); }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .pulse.live { background: #22c55e; }
  .empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 13px; }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-title">Thematic Rotation Dashboard</div>
        <div class="brand-sub">SP500 · NDX100 · DJIA · 5-level taxonomy · AI-assisted</div>
      </div>
    </div>
    <div class="topbar-right">

      <button class="icon-btn" id="fetchBtn" onclick="fetchAllPrices()">↺ Live prices</button>
      <div class="tf-tabs" id="tfTabs">
        <button class="tf-btn active" data-tf="1D">1D</button>
        <button class="tf-btn" data-tf="1W">1W</button>
        <button class="tf-btn" data-tf="1M">1M</button>
        <button class="tf-btn" data-tf="3M">3M</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-sec">
        <div class="sec-lbl">Sectors</div>
        <div id="sectorList"></div>
      </div>
      <div class="sidebar-sec">
        <div class="sec-lbl">AI Theme Builder</div>
        <div class="ai-input-row">
          <input id="aiInput" placeholder="e.g. Quantum computing…" onkeydown="if(event.key==='Enter')runAI()"/>
          <button id="aiBtn" onclick="runAI()">Ask ↗</button>
        </div>
        <div id="aiResult"></div>
      </div>
    </div>

    <div class="content">
      <div class="card">
        <div class="card-header">
          <div class="breadcrumb" id="breadcrumb">All sectors</div>
          <button class="back-btn" id="backBtn" style="display:none" onclick="drillUp()">← Back</button>
        </div>
        <div id="heatmapArea"></div>
        <div class="status-row">
          <span class="pulse" id="pulseDot"></span>
          <span id="statusText">Demo data · click any cell to drill down</span>
        </div>
      </div>
      <div id="tickerArea" style="display:none" class="ticker-area">
        <div class="card-header"><span style="font-size:12px;font-weight:600" id="tickerAreaTitle">Tickers</span></div>
        <div class="ticker-grid" id="tickerGrid"></div>
      </div>
    </div>
  </div>
</div>

const DEMO={};
function seedDemo(n){
  if(n.tickers) n.tickers.forEach(t=>{ if(!DEMO[t.s]) DEMO[t.s]={'1D':+(Math.random()*8-3).toFixed(2),'1W':+(Math.random()*15-5).toFixed(2),'1M':+(Math.random()*30-10).toFixed(2),'3M':+(Math.random()*60-20).toFixed(2)}; });
  ['sectors','themes','subthemes','domains'].forEach(k=>{ if(n[k]) n[k].forEach(seedDemo); });
}
TAXONOMY.sectors.forEach(seedDemo);

let live={}, tf='1D', path=[], isLive=false, pendingSug=null;

function getNode(){
  if(!path.length) return TAXONOMY;
  let c=TAXONOMY;
  for(let id of path){ const l=c.sectors||c.themes||c.subthemes||c.domains; c=l.find(n=>n.id===id); if(!c) return TAXONOMY; }
  return c;
}
function getChildren(n){ return n.sectors||n.themes||n.subthemes||n.domains||[]; }
function allTickers(n){
  if(n.tickers) return n.tickers;
  const a=[];
  ['sectors','themes','subthemes','domains'].forEach(k=>{ if(n[k]) n[k].forEach(c=>allTickers(c).forEach(t=>{ if(!a.find(x=>x.s===t.s)) a.push(t); })); });
  return a;
}
function getPerf(tickers,key){
  if(!tickers||!tickers.length) return null;
  const vals=tickers.map(t=>{ const d=isLive?live[t.s]:DEMO[t.s]; return d?d[key]:null; }).filter(v=>v!==null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}
function bgColor(v){
  if(v===null) return 'var(--bg2)';
  if(v>=4) return '#15803d'; if(v>=2) return '#16a34a'; if(v>=.5) return '#4ade80'; if(v>=0) return '#bbf7d0';
  if(v>=-.5) return '#fecaca'; if(v>=-2) return '#f87171'; if(v>=-4) return '#dc2626'; return '#991b1b';
}
function textColor(v){ if(v===null) return 'var(--text2)'; return Math.abs(v)>=1.5?'#fff':v>=0?'#14532d':'#7f1d1d'; }
function fmt(v){ if(v===null||v===undefined) return '—'; return (v>=0?'+':'')+v.toFixed(2)+'%'; }

function renderSidebar(){
  document.getElementById('sectorList').innerHTML=TAXONOMY.sectors.map(s=>{
    const v=getPerf(allTickers(s),tf);
    return `<div class="sector-item${path[0]===s.id?' active':''}" onclick="nav('${s.id}')">
      <span class="s-dot" style="background:${s.color}"></span>
      <span class="s-name">${s.name}</span>
      <span class="s-chg ${v>=0?'pos':'neg'}">${fmt(v)}</span>
    </div>`;
  }).join('');
}
function renderBreadcrumb(){
  const back=document.getElementById('backBtn');
  back.style.display=path.length?'inline':'none';
  if(!path.length){ document.getElementById('breadcrumb').innerHTML='All sectors'; return; }
  let html=`<span class="bc-link" onclick="nav()">All</span>`,c=TAXONOMY;
  path.forEach((id,i)=>{
    const l=c.sectors||c.themes||c.subthemes||c.domains; c=l.find(n=>n.id===id);
    if(i<path.length-1) html+=`<span class="bc-sep">›</span><span class="bc-link" onclick="navTo(${i+1})">${c.name}</span>`;
    else html+=`<span class="bc-sep">›</span><span>${c.name}</span>`;
  });
  document.getElementById('breadcrumb').innerHTML=html;
}
function renderHeatmap(){
  const area=document.getElementById('heatmapArea');
  const tickerArea=document.getElementById('tickerArea');
  const node=getNode();
  const children=getChildren(node);
  if(!children.length&&node.tickers){
    area.innerHTML='';
    tickerArea.style.display='block';
    document.getElementById('tickerAreaTitle').textContent=node.name+' — tickers';
    document.getElementById('tickerGrid').innerHTML=node.tickers.map(t=>{
      const d=isLive?live[t.s]:DEMO[t.s]; const v=d?d[tf]:null;
      return `<div class="ticker-card"><div class="tc-sym">$${t.s}</div><div class="tc-chg ${v>=0?'pos':'neg'}">${fmt(v)}</div><div class="tc-name">${t.n}</div></div>`;
    }).join('');
    return;
  }
  tickerArea.style.display='none';
  const cols=children.length<=2?children.length:children.length<=4?2:children.length<=9?3:4;
  area.innerHTML=`<div class="heatmap-grid" style="grid-template-columns:repeat(${cols},1fr)">${
    children.map(child=>{
      const ticks=allTickers(child); const v=getPerf(ticks,tf);
      const nl=child.themes?'themes':child.subthemes?'sub-themes':child.domains?'domains':'tickers';
      return `<div class="heat-cell" style="background:${bgColor(v)};color:${textColor(v)}" onclick="nav('${child.id}')">
        <div class="hc-name">${child.name}</div>
        <div class="hc-chg">${fmt(v)}</div>
        <div class="hc-meta">${ticks.length} tickers</div>
        <div class="drill-hint">↳ ${nl}</div>
      </div>`;
    }).join('')
  }</div>`;
}
function render(){ renderSidebar(); renderBreadcrumb(); renderHeatmap(); }

window.nav=function(id){ if(!id){path=[];}else{path.push(id);} render(); };
window.drillUp=function(){ path.pop(); render(); };
window.navTo=function(idx){ path=path.slice(0,idx); render(); };

document.getElementById('tfTabs').addEventListener('click',e=>{
  if(!e.target.dataset.tf) return;
  tf=e.target.dataset.tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.toggle('active',b.dataset.tf===tf));
  render();
});

async function fetchAllPrices(){
  const btn=document.getElementById('fetchBtn');
  btn.textContent='↺ Fetching…'; btn.disabled=true;
  document.getElementById('statusText').textContent='Fetching live prices from Yahoo Finance…';
  document.getElementById('pulseDot').className='pulse';
  const seen=new Set(), allT=[];
  function collect(n){ if(n.tickers) n.tickers.forEach(t=>{ if(!seen.has(t.s)){seen.add(t.s);allT.push(t);} }); ['sectors','themes','subthemes','domains'].forEach(k=>{ if(n[k]) n[k].forEach(collect); }); }
  TAXONOMY.sectors.forEach(collect);
  const chunks=[], syms=allT.map(t=>t.s);
  for(let i=0;i<syms.length;i+=6) chunks.push(syms.slice(i,i+6));
  let ok=0,fail=0;
  for(const chunk of chunks){
    await Promise.all(chunk.map(async sym=>{
      try{
        const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=3mo&interval=1d`);
        if(!r.ok) throw new Error();
        const j=await r.json();
        const closes=j.chart.result[0].indicators.quote[0].close.filter(Boolean);
        const n=closes.length; if(n<2) throw new Error();
        live[sym]={'1D':((closes[n-1]-closes[n-2])/closes[n-2])*100,'1W':((closes[n-1]-closes[Math.max(0,n-6)])/closes[Math.max(0,n-6)])*100,'1M':((closes[n-1]-closes[Math.max(0,n-22)])/closes[Math.max(0,n-22)])*100,'3M':((closes[n-1]-closes[Math.max(0,n-66)])/closes[Math.max(0,n-66)])*100};
        ok++;
      } catch(e){ fail++; }
    }));
    await new Promise(r=>setTimeout(r,300));
  }
  if(ok>0){
    isLive=true;
    document.getElementById('demoBadge').style.display='none';
    document.getElementById('liveBadge').style.display='inline';
    document.getElementById('pulseDot').className='pulse live';
    document.getElementById('statusText').textContent=`Live · ${ok} tickers loaded · ${fail} skipped · ${new Date().toLocaleTimeString()}`;
  } else {
    document.getElementById('statusText').textContent='Yahoo Finance blocked (CORS) in browser — try opening via a local server or use FMP key';
  }
  btn.textContent='↺ Live prices'; btn.disabled=false;
  render();
}

window.runAI=async function(){
  const input=document.getElementById('aiInput').value.trim();
  if(!input) return;
  const el=document.getElementById('aiResult');
  const btn=document.getElementById('aiBtn');
  el.innerHTML='<div class="thinking">Thinking…</div>';
  btn.disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`You are a financial taxonomy expert. Respond ONLY with a valid JSON object, no markdown, no backticks, no explanation. Fields:
{"theme":"string","parentSector":"one of: Technology|Health Care|Energy|Financials|Consumer|Industrials|Real Estate|Materials|Utilities|Communication Services","parentTheme":"string","subtheme":"string","domains":[{"name":"string","tickers":["TICK1","TICK2","TICK3"]}],"rationale":"one sentence"}
2-4 domains, 3-5 real US-listed tickers each.`,
        messages:[{role:'user',content:`Theme: ${input}`}]})
    });
    const data=await res.json();
    const text=data.content.map(c=>c.text||'').join('');
    const parsed=JSON.parse(text.replace(/```[a-z]*|```/g,'').trim());
    pendingSug=parsed;
    let html=`<div class="ai-suggestion">
      <div class="sug-row"><span class="sug-lbl">Sector</span><span class="sug-val">${parsed.parentSector}</span></div>
      <div class="sug-row"><span class="sug-lbl">Theme</span><span class="sug-val">${parsed.parentTheme}</span></div>
      <div class="sug-row"><span class="sug-lbl">Sub-theme</span><span class="sug-val">${parsed.subtheme}</span></div>
      <div class="sug-rationale">${parsed.rationale}</div>`;
    parsed.domains.forEach(d=>{
      html+=`<div class="sug-domain"><div class="sug-domain-name">${d.name}</div><div class="ticker-pills">${d.tickers.map(t=>`<span class="tp">$${t}</span>`).join('')}</div></div>`;
    });
    html+=`<button class="add-btn" id="addBtn">+ Add to taxonomy</button></div>`;
    el.innerHTML=html;
    document.getElementById('addBtn').onclick=addSuggestion;
  } catch(e){
    el.innerHTML=`<div class="err-msg">Error: ${e.message||'Could not parse response'}</div>`;
  }
  btn.disabled=false;
};

function addSuggestion(){
  if(!pendingSug) return;
  const p=pendingSug;
  let sector=TAXONOMY.sectors.find(s=>s.name===p.parentSector)||TAXONOMY.sectors[0];
  let theme=sector.themes.find(t=>t.name===p.parentTheme);
  if(!theme){ theme={id:'t'+Date.now(),name:p.parentTheme,color:'#7F77DD',subthemes:[]}; sector.themes.push(theme); }
  const st={id:'st'+Date.now(),name:p.subtheme,color:'#1D9E75',domains:p.domains.map((d,i)=>({id:'d'+Date.now()+i,name:d.name,color:'#EF9F27',tickers:d.tickers.map(s=>({s,n:s}))}))};
  theme.subthemes.push(st);
  st.domains.forEach(dom=>dom.tickers.forEach(t=>{ if(!DEMO[t.s]) DEMO[t.s]={'1D':+(Math.random()*8-3).toFixed(2),'1W':+(Math.random()*15-5).toFixed(2),'1M':+(Math.random()*30-10).toFixed(2),'3M':+(Math.random()*60-20).toFixed(2)}; }));
  pendingSug=null;
  document.getElementById('aiResult').innerHTML=`<div class="success-msg">Added "${p.subtheme}" → ${sector.name} › ${theme.name}</div>`;
  document.getElementById('aiInput').value='';
  render();
}

render();
</script>
</body>
</html>
